<!DOCTYPE html>
<html>
<head>
<title>Verify OTP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#020617,#0b1120,#1e293b);
background-size:300% 300%;
animation:gradientShift 10s ease infinite;
font-family:'Inter',sans-serif;
padding:24px;
}

@keyframes gradientShift{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.box{
background:rgba(255,255,255,.97);
backdrop-filter:blur(25px);
padding:46px 34px 40px;
border-radius:30px;
width:100%;
max-width:420px;
text-align:center;
box-shadow:0 40px 80px rgba(0,0,0,.35);
display:flex;
flex-direction:column;
align-items:center;
}

.icon{
font-size:3.4rem;
margin-bottom:14px;
}

h2{
font-size:2rem;
font-weight:700;
margin-bottom:6px;
color:#1e293b;
}

.subtitle{
color:#64748b;
font-size:1rem;
margin-bottom:28px;
}

.otp-container{
display:flex;
justify-content:center;
gap:10px;
width:100%;
margin-bottom:26px;
}

.otp-input{
width:54px;
height:64px;
border-radius:16px;
border:2px solid #e2e8f0;
font-size:24px;
font-weight:700;
text-align:center;
outline:none;
transition:.25s;
background:#f8fafc;
}

.otp-input:focus{
border-color:#16a34a;
box-shadow:0 0 0 3px rgba(22,163,74,.15);
transform:scale(1.05);
background:#fff;
}
.otp-note{
color:#f59e0b;
font-size:.9rem;
margin-bottom:6px;
font-weight:500;
}

.timer{
color:#ef4444;
font-weight:700;
margin-bottom:20px;
font-size:1rem;
letter-spacing:1px;
}
button{
width:100%;
height:64px;
border:none;
border-radius:22px;
background:linear-gradient(135deg,#16a34a,#22c55e,#4ade80);
color:#fff;
font-size:16px;
font-weight:600;
cursor:pointer;
letter-spacing:.8px;
box-shadow:0 18px 40px rgba(22,163,74,.45);
transition:.3s;
margin-top:4px;
}

button:hover{
transform:translateY(-4px);
box-shadow:0 25px 55px rgba(22,163,74,.6);
}

.resend-link{
margin-top:18px;
font-size:.95rem;
color:#64748b;
text-decoration:none;
}

.resend-link:hover{
color:#16a34a;
}

.error{
background:#fee2e2;
color:#dc2626;
padding:12px 16px;
border-radius:14px;
margin-bottom:20px;
width:100%;
}

.loading{
display:inline-block;
width:22px;
height:22px;
border:3px solid rgba(255,255,255,.4);
border-top-color:#fff;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg);}
}


@media(max-width:480px){

.box{
padding:40px 24px 34px;
}

.otp-input{
width:46px;
height:58px;
font-size:20px;
}

h2{
font-size:1.7rem;
}

}

</style>
</head>

<body>

<div class="box">

<div class="icon">🔐</div>

<h2>Verify OTP</h2>
<p class="subtitle">Enter the 6-digit code sent to your input email</p>
<p class="otp-note">
⚠️ Your OTP is valid only for <b>2 minutes</b>
</p>

<p class="timer" id="timer">02:00</p>
{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="POST" id="otpForm">
{% csrf_token %}

<div class="otp-container">
<input type="text" class="otp-input" maxlength="1">
<input type="text" class="otp-input" maxlength="1">
<input type="text" class="otp-input" maxlength="1">
<input type="text" class="otp-input" maxlength="1">
<input type="text" class="otp-input" maxlength="1">
<input type="text" class="otp-input" maxlength="1">
</div>

<input type="hidden" name="otp" id="finalOtp">

<button type="submit" id="verifyBtn">
<span id="btn-text">Verify Securely</span>
<span id="btn-loading" class="loading" style="display:none;"></span>
</button>

</form>

<a href="{% url 'resend_otp' %}" class="resend-link">
Didn't receive? Resend OTP
</a>

</div>

<script>
const otpInputs = document.querySelectorAll('.otp-input');
const finalOtp = document.getElementById('finalOtp');

window.onload = () => otpInputs[0].focus();

otpInputs.forEach((input,index)=>{

input.addEventListener('input',()=>{
input.value = input.value.replace(/\D/g,'');

if(input.value && index < otpInputs.length-1){
otpInputs[index+1].focus();
}
});

input.addEventListener('keydown',(e)=>{
if(e.key === 'Backspace' && !input.value && index>0){
otpInputs[index-1].focus();
}
});

});

document.getElementById('otpForm').addEventListener('submit',(e)=>{

let otp = "";
otpInputs.forEach(i => otp += i.value);

finalOtp.value = otp;   

if(otp.length !== 6){
e.preventDefault();
alert(`Check your mail and enter full OTP\notp should be 6 digits long\n \nName of the otp is Apple🍎`);
return;
}

document.getElementById('btn-text').style.display='none';
document.getElementById('btn-loading').style.display='inline-block';

});
let timeLeft = {{ remaining_time|default:120 }};

const timer = document.getElementById("timer");

const countdown = setInterval(()=>{

let minutes = Math.floor(timeLeft / 60);
let seconds = timeLeft % 60;

timer.innerHTML =
`${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;

timeLeft--;

if(timeLeft < 0){
clearInterval(countdown);
timer.innerHTML = "OTP Expired ❌";
timer.style.color = "red";

document.getElementById("verifyBtn").disabled = true;
document.getElementById("verifyBtn").style.opacity = "0.5";


setTimeout(()=>{
    window.location.href = "{% url 'email_send' %}";
},2000);
}

},1000);
</script>

</body>
</html>
