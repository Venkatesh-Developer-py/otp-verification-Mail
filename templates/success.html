<!DOCTYPE html>
<html>
<head>
<title>Email Verified Successfully</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #10b981 0%, #059669 50%, #047857 100%);
    background-size: 400% 400%;
    animation: gradientSuccess 8s ease infinite;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 20px;
}

@keyframes gradientSuccess {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
}

.success-box {
    background: rgba(255, 255, 255, 0.98);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    padding: 60px 50px;
    border-radius: 32px;
    width: 100%;
    max-width: 480px;
    text-align: center;
    box-shadow: 
        0 40px 80px rgba(0, 0, 0, 0.2),
        0 0 0 1px rgba(255, 255, 255, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
    border: 1px solid rgba(255, 255, 255, 0.4);
    position: relative;
    overflow: hidden;
    animation: successSlideIn 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

@keyframes successSlideIn {
    from {
        opacity: 0;
        transform: scale(0.7) translateY(30px);
    }
    to {
        opacity: 1;
        transform: scale(1) translateY(0);
    }
}

.success-icon {
    font-size: 5rem;
    margin-bottom: 2rem;
    background: linear-gradient(135deg, #10b981, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: successBounce 2s infinite;
}

@keyframes successBounce {
    0%, 20%, 50%, 80%, 100% { transform: translateY(0) scale(1); }
    40% { transform: translateY(-20px) scale(1.05); }
    60% { transform: translateY(-10px) scale(1.02); }
}

h2 {
    font-size: 2.5rem;
    font-weight: 800;
    margin-bottom: 1.5rem;
    background: linear-gradient(135deg, #064e3b, #065f46);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.03em;
}

.success-message {
    font-size: 1.2rem;
    color: #1e293b;
    margin-bottom: 2.5rem;
    font-weight: 500;
    line-height: 1.6;
    max-width: 90%;
    margin-left: auto;
    margin-right: auto;
}

.cta-button {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 18px 40px;
    background: linear-gradient(135deg, #10b981, #34d399);
    color: white;
    text-decoration: none;
    border-radius: 20px;
    font-size: 16px;
    font-weight: 600;
    box-shadow: 0 15px 35px rgba(16, 185, 129, 0.4);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    position: relative;
    overflow: hidden;
    font-family: inherit;
}

.cta-button::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.6s;
}

.cta-button:hover {
    transform: translateY(-4px) scale(1.02);
    box-shadow: 0 25px 50px rgba(16, 185, 129, 0.5);
    background: linear-gradient(135deg, #059669, #10b981);
}

.cta-button:hover::before {
    left: 100%;
}

.cta-button:active {
    transform: translateY(-2px) scale(1);
}

/* Responsive */
@media (max-width: 480px) {
    .success-box {
        padding: 45px 35px;
        margin: 10px;
    }
    
    h2 {
        font-size: 2rem;
    }
    
    .success-message {
        font-size: 1.1rem;
    }
}
</style>
</head>
<body>

<div class="success-box">
    <div class="success-icon">✔️</div>
    <h2>Email Verified Successfully</h2>
    <p class="success-message">Thank you for verifying your email. You can now access all features of your account.</p>
    
    
</div>

</body>
</html>
