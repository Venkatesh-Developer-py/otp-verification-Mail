<!DOCTYPE html>
<html>
<head>
<title>Email Verification</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
    background-size: 400% 400%;
    animation: gradientShift 12s ease infinite;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 20px;
    position: relative;
    overflow: hidden;
}

@keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
}

/* Floating Particles */
body::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: 
        radial-gradient(2px 2px at 20px 30px, #bae6fd, transparent),
        radial-gradient(2px 2px at 40px 70px, rgba(59,130,246,0.8), transparent),
        radial-gradient(1px 1px at 90px 40px, #f97316, transparent),
        radial-gradient(1px 1px at 130px 80px, #eab308, transparent);
    background-repeat: repeat;
    background-size: 200px 100px;
    animation: float 20s linear infinite;
    opacity: 0.1;
}

@keyframes float {
    0% { transform: translateY(0px) rotate(0deg); }
    100% { transform: translateY(-20px) rotate(360deg); }
}

.box {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    padding: 50px 40px;
    border-radius: 28px;
    width: 100%;
    max-width: 420px;
    text-align: center;
    box-shadow: 
        0 35px 60px rgba(0, 0, 0, 0.3),
        0 0 0 1px rgba(255, 255, 255, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.3);
    position: relative;
    overflow: hidden;
    transform: translateY(0);
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.box::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, #2563eb, transparent);
}

.box:hover {
    transform: translateY(-8px);
    box-shadow: 
        0 45px 80px rgba(0, 0, 0, 0.4),
        0 0 0 1px rgba(37, 99, 235, 0.3);
}

.icon {
    font-size: 4rem;
    margin-bottom: 1.5rem;
    background: linear-gradient(135deg, #2563eb, #3b82f6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: bounce 2s infinite;
}

@keyframes bounce {
    0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-10px); }
    60% { transform: translateY(-5px); }
}

h2 {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 1rem;
    background: linear-gradient(135deg, #1e293b, #334155);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.02em;
}

.subtitle {
    color: #64748b;
    font-size: 1rem;
    margin-bottom: 2.5rem;
    line-height: 1.6;
    font-weight: 400;
}

.input-group {
    position: relative;
    margin-bottom: 1.8rem;
}

input {
    width: 100%;
    padding: 20px 24px 20px 60px;
    border: 2px solid #e2e8f0;
    border-radius: 20px;
    outline: none;
    font-size: 16px;
    font-weight: 500;
    background: linear-gradient(135deg, #f8fafc, #f1f5f9);
    color: #1e293b;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    height: 68px;
    font-family: inherit;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
}

input::placeholder {
    color: #94a3b8;
    font-weight: 400;
}

.input-icon {
    position: absolute;
    left: 24px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 22px;
    color: #64748b;
    z-index: 2;
    transition: all 0.3s ease;
}

input:focus {
    border-color: #2563eb;
    box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1), 0 20px 40px rgba(37, 99, 235, 0.15);
    background: #ffffff;
    transform: translateY(-3px);
}

input:focus + .input-icon {
    color: #2563eb;
    transform: translateY(-50%) scale(1.1);
}

button {
    width: 100%;
    padding: 20px;
    border: none;
    border-radius: 20px;
    background: linear-gradient(135deg, #2563eb, #3b82f6);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 12px 30px rgba(37, 99, 235, 0.4);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    height: 68px;
    position: relative;
    overflow: hidden;
    font-family: inherit;
}

button::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.6s;
}

button:hover {
    transform: translateY(-4px);
    box-shadow: 0 25px 50px rgba(37, 99, 235, 0.5);
    background: linear-gradient(135deg, #1d4ed8, #2563eb);
}

button:hover::before {
    left: 100%;
}

button:active {
    transform: translateY(-2px);
}

.loading {
    display: inline-block;
    width: 22px;
    height: 22px;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    border-top-color: #fff;
    animation: spin 1s ease-in-out infinite;
    margin-right: 10px;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* Responsive */
@media (max-width: 480px) {
    .box {
        padding: 40px 30px;
        margin: 10px;
    }
    
    h2 {
        font-size: 1.7rem;
    }
    
    input, button {
        height: 60px;
        padding: 18px 20px 18px 55px;
    }
}
</style>
</head>
<body>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}
<div class="box">
    <div class="icon">🚀</div>
    <h2>Verify Email</h2>
    <p class="subtitle">Enter your email to receive 6-digit verification code</p>

    <form method="POST" id="emailForm">
        {% csrf_token %}
        <div class="input-group">
            <span class="input-icon">📧</span>
            <input type="email" name="email" id="email" placeholder="your.email@example.com" required autocomplete="email">
        </div>
        <button type="submit" id="sendBtn">
            <span id="btn-text">Send OTP</span>
            <span id="btn-loading" class="loading" style="display: none;"></span>
        </button>
    </form>
</div>

<script>
document.getElementById('emailForm').addEventListener('submit', function() {
    const btn = document.getElementById('sendBtn');
    const btnText = document.getElementById('btn-text');
    const btnLoading = document.getElementById('btn-loading');
    
    btnText.style.display = 'none';
    btnLoading.style.display = 'inline-block';
    btn.disabled = true;
});

// Auto-focus email input
window.addEventListener('load', function() {
    document.getElementById('email').focus();
});

// Real-time email validation
document.getElementById('email').addEventListener('input', function(e) {
    const email = e.target.value;
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (email && !emailRegex.test(email)) {
        e.target.style.borderColor = '#ef4444';
    } else {
        e.target.style.borderColor = '#e2e8f0';
    }
});
</script>

</body>
</html>
